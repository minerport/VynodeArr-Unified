services:
  vynodearr:
    image: ghcr.io/minerport/vynodearr-unified:${VYNODEARR_VERSION:-1.0.7}
    container_name: vynodearr
    restart: unless-stopped
    ports:
      - "8686:8686"
    environment:
      TZ: ${TZ:-America/New_York}
      VYNODEARR_SECURE_COOKIES: "false"
    volumes:
      - ./data:/config
      - ./movies:/movies
      - ./television:/tv
      - ./downloads:/downloads
