services:
  vynodearr:
    image: ghcr.io/minerport/vynodearr-unified:0.4.4
    container_name: vynodearr
    restart: unless-stopped
    stop_grace_period: 60s
    user: "${PUID:-1000}:${PGID:-1000}"
    ports:
      - "8686:8686"
    volumes:
      - ./config:/config
      - /path/to/movies:/movies
      - /path/to/tv:/tv
      - /path/to/downloads:/downloads
    environment:
      TZ: America/New_York
      HOME: /config
      VynodeArr__LifecycleApiKey: "${VYNODEARR_CONTROL_KEY:?Set VYNODEARR_CONTROL_KEY before starting Compose}"
