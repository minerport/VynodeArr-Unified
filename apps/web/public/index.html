<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#080c16">
  <title>VynodeNew — Your media, one horizon</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <section id="auth-view" class="auth-view" hidden>
    <div class="auth-panel">
      <div class="brand"><span class="brand-mark">V</span><span>VynodeNew</span></div>
      <span class="eyebrow">ONE MEDIA HORIZON</span>
      <h1 id="auth-title">Sign in</h1>
      <p id="auth-copy">Continue to your unified Movies and TV library.</p>
      <form id="auth-form">
        <label>Administrator username<input name="username" autocomplete="username" required minlength="3"></label>
        <label>Password<input name="password" type="password" autocomplete="current-password" required minlength="12"></label>
        <p id="auth-error" class="form-error" role="alert"></p>
        <button class="primary" type="submit">Continue</button>
      </form>
    </div>
  </section>
  <div id="app-shell" class="app-shell" hidden>
    <aside>
      <a class="brand" href="#dashboard" aria-label="VynodeNew home"><span class="brand-mark">V</span><span>VynodeNew</span></a>
      <nav aria-label="Primary">
        <a href="#dashboard">Dashboard</a><p>Media</p>
        <a href="#movies">Movies</a><a href="#tv">TV</a>
        <a href="#queue">Queue</a><a href="#history">History</a><a href="#calendar">Calendar</a>
        <p>Manage</p><a href="#settings">Settings</a><a href="#system">System</a>
      </nav>
      <div class="account"><span class="avatar">A</span><span><strong id="account-name">Administrator</strong><small>Read-only review mode</small></span><button id="logout" title="Sign out">↗</button></div>
    </aside>
    <main>
      <header>
        <button class="menu" aria-label="Open navigation">☰</button>
        <label class="search"><span>⌕</span><input id="global-search" aria-label="Search current view" placeholder="Search your library"></label>
        <span id="mode-badge" class="mode-badge"></span>
        <span class="status-dot"></span><span class="status-label">Gateway ready</span>
      </header>
      <section id="content" aria-live="polite"></section>
    </main>
  </div>
  <template id="media-page">
    <div class="hero"><div><span class="eyebrow">YOUR LIBRARY</span><h1></h1><p class="lede"></p></div><span class="read-only">Read-only review mode</span></div>
    <div class="summary"><div><strong class="count">—</strong><span>Titles</span></div><div><strong class="monitored">—</strong><span>Monitored</span></div><div><strong class="attention">—</strong><span>Need attention</span></div><div><strong class="coverage">—</strong><span>Library coverage</span></div></div>
    <div class="toolbar">
      <div class="filters"><button data-filter="all" class="chip selected">All</button><button data-filter="monitored" class="chip">Monitored</button><button data-filter="missing" class="chip">Missing</button></div>
      <div><select class="sort" aria-label="Sort media"><option value="title">Title</option><option value="year">Year</option><option value="attention">Attention</option></select><button data-view="poster" class="icon-button selected" title="Poster grid">▦</button><button data-view="compact" class="icon-button" title="Compact grid">▤</button><button data-view="list" class="icon-button" title="Detailed list">☷</button></div>
    </div>
    <div class="grid skeleton-grid"><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div></div>
  </template>
  <script type="module" src="/app.js"></script>
</body>
</html>
