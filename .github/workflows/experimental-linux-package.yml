name: Experimental Linux package

on:
  push:
    branches:
      - agent/cross-platform-installation
    paths:
      - '.github/workflows/experimental-linux-package.yml'
      - 'distribution/docker/**'
      - 'distribution/linux/**'
      - 'distribution/source-lock.json'
      - 'src/VynodeArr.Gateway/**'
  workflow_dispatch:
    inputs:
      runtime:
        description: Linux runtime identifier
        required: true
        default: linux-x64
        type: choice
        options:
          - linux-x64
          - linux-arm64
      publish_image:
        description: Publish the validated x64 image to GHCR
        required: true
        default: false
        type: boolean
      image_tag:
        description: Version tag to publish when image publishing is enabled
        required: true
        default: 0.4.1
        type: string

permissions:
  contents: read
  packages: write

jobs:
  compose-linux-package:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    env:
      TARGET_RUNTIME: ${{ inputs.runtime || 'linux-x64' }}

    steps:
      - name: Check out VynodeArr
        uses: actions/checkout@v4
        with:
          path: unified

      - name: Check out locked movie source
        uses: actions/checkout@v4
        with:
          repository: minerport/VydodeArr
          ref: de4811318ef1eb6560a5e480cc4bba2afc008ca9
          path: movie

      - name: Check out locked television source
        uses: actions/checkout@v4
        with:
          repository: minerport/VynodeArr2
          ref: a29f15e92bd2c21e646d065d9d78066952cac05d
          path: television

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.423

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.302

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.11.1
          cache: yarn
          cache-dependency-path: |
            movie/yarn.lock
            television/yarn.lock

      - name: Install Yarn
        run: npm install --global yarn@1.22.22

      - name: Build locked Linux engines
        shell: pwsh
        run: >-
          ./unified/distribution/linux/build-native-engines.ps1
          -MovieSource ./movie
          -TelevisionSource ./television
          -YarnPath yarn
          -RuntimeIdentifier '${{ env.TARGET_RUNTIME }}'
          -OutputPath ./unified/artifacts/native-inputs/${{ env.TARGET_RUNTIME }}

      - name: Compose unified Linux package
        shell: pwsh
        working-directory: unified
        run: >-
          ./distribution/linux/package.ps1
          -MovieEnginePath ./artifacts/native-inputs/${{ env.TARGET_RUNTIME }}/movie
          -TelevisionEnginePath ./artifacts/native-inputs/${{ env.TARGET_RUNTIME }}/television
          -RuntimeIdentifier '${{ env.TARGET_RUNTIME }}'

      - name: Verify Linux installer payload
        working-directory: unified
        run: |
          test -x artifacts/linux/VynodeArr-${TARGET_RUNTIME}/install.sh
          test -x artifacts/linux/VynodeArr-${TARGET_RUNTIME}/uninstall.sh
          bash -n artifacts/linux/VynodeArr-${TARGET_RUNTIME}/install.sh
          bash -n artifacts/linux/VynodeArr-${TARGET_RUNTIME}/uninstall.sh
          test -f artifacts/linux/VynodeArr-${TARGET_RUNTIME}/vynodearr.service
          test -f artifacts/linux/VynodeArr-${TARGET_RUNTIME}/vynodearr.env.example

      - name: Build and smoke-test x64 container
        if: env.TARGET_RUNTIME == 'linux-x64'
        working-directory: unified
        env:
          VYNODEARR_CONTROL_KEY: workflow-smoke-test-key
        run: |
          docker build \
            --file distribution/docker/Dockerfile \
            --tag vynodearr:experimental \
            artifacts/linux/VynodeArr-linux-x64
          mkdir -p artifacts/container-config
          chmod 777 artifacts/container-config
          docker run --detach \
            --name vynodearr-smoke \
            --publish 8686:8686 \
            --volume "$PWD/artifacts/container-config:/config" \
            --env VynodeArr__LifecycleApiKey="$VYNODEARR_CONTROL_KEY" \
            vynodearr:experimental
          for attempt in $(seq 1 60); do
            health=$(curl --silent --fail http://127.0.0.1:8686/health || true)
            if echo "$health" | jq -e '.engines.movie.state == "Running" and .engines.television.state == "Running"' >/dev/null; then
              break
            fi
            if [ "$attempt" -eq 60 ]; then
              docker logs vynodearr-smoke
              exit 1
            fi
            sleep 2
          done
          docker stop --time 60 vynodearr-smoke
          test "$(docker inspect --format '{{.State.Running}}' vynodearr-smoke)" = "false"
          docker rm vynodearr-smoke

      - name: Publish validated x64 container
        if: >-
          env.TARGET_RUNTIME == 'linux-x64' &&
          ((github.event_name == 'workflow_dispatch' && inputs.publish_image) ||
          (github.event_name == 'push' && contains(github.event.head_commit.message, '[publish-image]')))
        working-directory: unified
        env:
          IMAGE_TAG: ${{ inputs.image_tag || '0.4.1' }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! echo "$IMAGE_TAG" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([._-][A-Za-z0-9._-]+)?$'; then
            echo "Invalid container tag: $IMAGE_TAG" >&2
            exit 1
          fi
          echo "$GHCR_TOKEN" | docker login ghcr.io --username "${{ github.actor }}" --password-stdin
          docker tag vynodearr:experimental "ghcr.io/minerport/vynodearr-unified:$IMAGE_TAG"
          docker tag vynodearr:experimental ghcr.io/minerport/vynodearr-unified:experimental
          docker push "ghcr.io/minerport/vynodearr-unified:$IMAGE_TAG"
          docker push ghcr.io/minerport/vynodearr-unified:experimental

      - name: Upload Linux package
        uses: actions/upload-artifact@v4
        with:
          name: VynodeArr-${{ env.TARGET_RUNTIME }}
          path: unified/artifacts/linux/VynodeArr-${{ env.TARGET_RUNTIME }}.tar.gz
          if-no-files-found: error
          retention-days: 14
