name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm run verify

  unraid:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/minerport/vynodearr-unified
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.unraid
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  artifacts:
    needs: verify
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Package Windows Docker Desktop edition
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME.TrimStart('v')
          New-Item -ItemType Directory -Path release | Out-Null
          Copy-Item distribution/windows release/VynodeArr-Windows-x64 -Recurse
          Copy-Item LICENSE,OPEN_SOURCE_NOTICES,THIRD_PARTY_NOTICES release/VynodeArr-Windows-x64/
          Compress-Archive -Path release/VynodeArr-Windows-x64 -DestinationPath "release/VynodeArr-Windows-x64-$version.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: release/VynodeArr-Windows-x64-*.zip

  publish:
    needs: [unraid, artifacts]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: release
      - name: Stage Community Applications templates
        run: |
          version="${GITHUB_REF_NAME#v}"
          cp templates/vynodearr.xml "release/VynodeArr-Unraid-${version}.xml"
          cp templates/ca_profile.xml "release/VynodeArr-Community-Applications-Profile-${version}.xml"
      - uses: softprops/action-gh-release@v2
        with:
          name: VynodeArr ${{ github.ref_name }}
          generate_release_notes: true
          make_latest: true
          files: release/*
