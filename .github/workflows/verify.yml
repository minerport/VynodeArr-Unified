name: Verify
on:
  push:
    branches: [develop]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm run verify
      - name: Prepare review environment
        run: cp .env.example .env
      - run: docker compose --env-file .env.example config
